# Test configuration for acceptance tests
# This profile is used when running the backend application in embedded mode

# Server configuration - using local development port
server.port=7031
management.server.port=7032

# Logging configuration
logging.level.org.readtogether=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# Disable unnecessary features for tests
spring.cloud.openfeign.httpclient.enabled=false
spring.cloud.openfeign.okhttp.enabled=false

# Database configuration - will be overridden by Testcontainers
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Security configuration for tests
app.jwt.secret=test-secret-key-for-acceptance-tests-at-least-32-characters-long
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=1800000

# File upload configuration
app.file.upload.max-size=500MB
app.file.upload.base-path=/tmp/acceptance-test-uploads

# AWS configuration - disable for tests
cloud.aws.credentials.access-key=test
cloud.aws.credentials.secret-key=test
cloud.aws.region.static=us-east-1
cloud.aws.s3.bucket=test-bucket