server.port=5006

spring.application.name=read-together-application

# Database config - AWS RDS configuration
spring.datasource.url=${DB_SERVICE_URL:jdbc:postgresql://localhost:5434/read-together-app-db}
spring.datasource.username=${DB_SERVICE_USERNAME:default}
spring.datasource.password=${DB_SERVICE_PASSWORD:default}
spring.datasource.driver-class-name=org.postgresql.Driver

# OpenFeign configuration
spring.cloud.openfeign.client.config.default.loggerLevel=BASIC
spring.cloud.openfeign.client.config.default.readTimeout=5000
spring.cloud.openfeign.client.config.default.connectTimeout=5000


# Actuator endpoints for AWS ECS health checks
springdoc.show-actuator=true
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=ALWAYS
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Server configuration for containerized environments
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Application Configuration
app.base-url=http://localhost:8080

# File Upload Configuration
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Storage Configuration - Configurable between S3, Local, or other providers
storage.provider=${STORAGE_PROVIDER:local}

# AWS S3 Configuration
storage.s3.bucket=${AWS_S3_BUCKET:read-together-sessions}
storage.s3.region=${AWS_REGION:us-east-1}
storage.s3.access-key=${AWS_ACCESS_KEY_ID:}
storage.s3.secret-key=${AWS_SECRET_ACCESS_KEY:}
storage.s3.endpoint=${AWS_S3_ENDPOINT:}

# Local Storage Configuration
storage.local.base-path=${LOCAL_STORAGE_PATH:/tmp/read-together/uploads}
storage.local.public-url-base=${LOCAL_PUBLIC_URL:http://localhost:5006/api/v1/files}

# Session Configuration
session.upload.allowed-types=audio/mpeg,audio/wav,audio/mp3,audio/mp4,video/mp4,video/avi,video/mov,video/webm
session.upload.max-size=500MB
session.upload.processing.timeout=30m
session.upload.processing.retry-attempts=3

# Async Configuration
async.core-pool-size=2
async.max-pool-size=10
async.queue-capacity=500
async.thread-name-prefix=AsyncExecutor-
